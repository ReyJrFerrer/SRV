<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Find and book local services with ease on the Internet Computer."
    />
    <title>SRV | Your Local Service Hub</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SRV" />
    <!-- Apple touch icons: iOS prefers PNGs at fixed sizes. If you don't have
      these PNGs yet, run `npm run generate:icons` in src/frontend to
      convert the existing /logo.svg into the recommended PNG sizes. -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon-180.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="167x167"
      href="/apple-touch-icon-167.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/apple-touch-icon-152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="/apple-touch-icon-120.png"
    />
    <!-- Fallback for older devices -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Safari pinned tab (optional): provide a monochrome SVG and a color -->
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#2563eb" />

    <!-- Additional PWA Meta Tags -->
    <meta name="msapplication-TileImage" content="/logo.svg" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="application-name" content="SRV" />
    <meta name="format-detection" content="telephone=no" />

    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
